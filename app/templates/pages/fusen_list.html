{% extends "base.html" %}
{% block head %}
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script type="module" src="{{ url_for('static', filename='js/fusenListMain.js') }}"></script>
{% endblock %}
{% block body_class %}layout-container{% endblock %}
{% block body_attribute %}data-storage-mode="{{ storageMode }}"{% endblock %}
{% block body %}
<header class="after-login-header">
    <img class="header-title" src="{{ url_for('static', filename='images/icon-80.svg')}}">
    <button id="login-open-button" class="button login-button button-text button-text-white">ログイン</button>
</header>
<main>
    <div id="fusen-list" class="fusen-container">
        <template id="fusen-template">
            <div class="fusen fusen-list-position" data-fusen-id="">
                {% include "parts/fusen_menu.html" %}
                <div class="fusen-inner">
                    <div class="fusen-front">
                        <span class="fusen-content"></span>
                        <img class="fusen-logo" src="{{ url_for('static', filename='images/chocottoMemo_fusen.svg')}}">
                    </div>
                    <div class="fusen-back">
                        <span class="fusen-expires-at"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>
    <button id="create-open-button" class="button create-button" type="button">
        <img class="icon" src="{{ url_for('static', filename='images/create-button.svg') }}" alt="作成">
    </button>
    {% include "parts/login-modal.html" %}
    {% include "parts/edit-modal.html" %}
</main>
{% endblock %}
