<!DOCTYPE html>
<html>
    <head>
        <title>ちょこっとメモ</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
            <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
            <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <script src="{{ url_for('static', filename='js/fusen_common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/fusen_edit.js') }}"></script>
    <body>
        <header onclick="location.href='{{ url_for("notes.index")}}'">
            <div class="header-container">
                <img src="{{ url_for('static', filename='images/Title_chocottoMemo.svg')}}">
                <div class="todays-text">今日の日付<br>２０２６年５月６日</div>
            </div>
        </header>
        <div class="edit-page-container">
            <div class="fusen-edit">
                <div class="fusen-inner">
                    <div class="fusen-front">来週やること</div>
                    <div class="fusen-back">期限日：2026 / 4 / 5</div>
                </div>
            </div>
            <form action="{{ url_for('notes.create_note') }}" method="post">
                <label class="headline-text" for="content">付箋に書きたいことは何かな<br>（１００文字まで）:</label>
                <br>
                <textarea class="content-box" id="content" name="content" rows="20" cols="50"></textarea>
                <br><br>
                <label class="headline-text" for="expires_at">付箋を貼り続ける期間を選択してね:</label>
                <br>
                <input class="expires-date-box" type="text" id="datepicker" name="expires_at">
                <br><br>
                <label class="headline-text" for="color">付箋の色を決めてね:</label>
                <br>
                <div class="color-pallet-background">
                    <button type="button" class="color-option selected" data-color="#A9CEEC" style="background: #A9CEEC;"></button>
                    <button type="button" class="color-option" data-color="#F8C394" style="background: #F8C394;"></button>
                    <button type="button" class="color-option" data-color="#FF9699" style="background: #FF9699;"></button>
                    <button type="button" class="color-option" data-color="#96F8AF" style="background: #96F8AF;"></button>
                    <button type="button" class="color-option" data-color="#FFE57B" style="background: #FFE57B;"></button>
                    <button type="button" class="color-option" data-color="#B3ADFF" style="background: #B3ADFF;"></button>
                </div><br>
                <input type="hidden" id="selected-color" name="color" value="#A9CEEC">
                <button type="submit" class="save-button" value="保存" name="create-data">
                    <span class="save-button-text">付箋を保存</span>
                    <img class="save-button-icon" src="{{ url_for('static', filename='images/sticky-note.svg') }}">
                </button>
            </form>
        </div>
    </body>
