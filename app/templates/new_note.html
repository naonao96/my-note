<!DOCTYPE html>
<html>
    <head>
        <title>ちょこっとメモ</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
            <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
            <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
            <link rel="script" href="{{ url_for('static', filename='js/notes.js') }}">
             <script>
                document.addEventListener('DOMContentLoaded', function() {
                    flatpickr("#datepicker", {
                        enableTime: true,
                        dateFormat: "Y-m-d H:i",
                    });
                });
            </script>
    </head>
    <body>
        <header>
            <h1>
                <span class="title-large">ちょこ</span>
                <span class="title-small">っと</span>
                <span class="title-large">メモ</span>
            </h1>
        </header>
        <form action="{{ url_for('notes.create_note') }}" method="post">
            <label for="title">タイトル:</label><br>
            <input type="text" id="title" name="title"><br><br>
            <label for="content">内容:</label><br>
            <textarea id="content" name="content" rows="20" cols="50"></textarea><br><br>

            <input type="text" id="datepicker"><br><br>
            
            <input type="submit" value="保存">
        </form>
    </body>
